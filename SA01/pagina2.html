<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Final</title>
    <link rel="stylesheet" href="style.css">
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
<div class="login-container">
        <div class="card">

            <div class="topo">
                <i class="bi bi-person-circle"></i>
                <h2>Finalize seu cadastro</h2>
                <p>Preencha os campos abaixo</p>
            </div>
          
                <div id="telefones">
    <div class="telefone-item">
        <input type="text" class="telefone" placeholder="Telefone">
        <button type="button" class="add-telefone">
            <i class="bi bi-plus-circle"></i>
        </button>
    </div>
</div>


     <div class="input-group">
            <input type="text" id="cep" placeholder="CEP">
            </div>

             <div class="input-group2">
              <label for="uf">Estado:</label>
            <select name="uf" id="uf">
            <option value="" selected disabled>Estado</option>
            </select>

            <label for="city">Cidade:</label>
            <select name="city" id="city">
            <option value="" >Estado primeiro</option>
            </select>
            </div>

             <div class="input-group">
             <input type="text" id="endereco" placeholder="Endereço">
            </div>

              <div class="input-group2">  
            <input type="text" id="numero" placeholder="Número">
            <input type="text" id="complemento" placeholder="Complemento">
            </div>
            
    

         

          



        

        <button id="validar">Cadastrar</button>

        <p id="mensagem"></p>

        </div>
</div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="pagina2.js"></script>

</body>

</html>
