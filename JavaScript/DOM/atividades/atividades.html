<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividades</title>
    <link rel="stylesheet" href="atividades.css">
</head>
<body>
    <h2>Atividade 1 - Alterar a cor do texto pelo botão</h2>
    <div class="container">
        <h1 id="outracor">Outra cor</h1>
        <button id="azul">Azul</button>
        <button id="vermelho">Vermelho</button>
    </div>
    <hr>
    <h2>Atividade 2 - Mostrar e esconder Mensagem</h2>
    <div class="container">
        <button id="mostrar">Mostrar/Esconder</button>
        <p id="texto1" class="oculto">Este é o texto</p>
    </div>
    <hr>
    <h2>Atividade 3 - Contador de caracteres</h2>
    <div class="container">
         <input type="text" id="caracter" placeholder="Digite seu texto">
         <p id="contador">Caractéres: 0 </p>
    </div>
    <hr>
    <h2>Atividade 4 - Contador de cliques</h2>
    <div class="container">
        <button id="clicar">Clique aqui</button>
        <p id="contarclique">Cliques: 0 </p>
    </div>
    
    




    <script src="atividades.js"></script>
</body>
</html>
